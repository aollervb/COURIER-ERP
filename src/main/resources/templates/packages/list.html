<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Packages</title>
    <meta charset="utf-8"/>
</head>
<body>

<h1>Packages</h1>

<p>
    <a th:href="@{/packages/receiving}">Receive</a> |
    <a th:href="@{/packages/batches}">Batches</a> |
    <a th:href="@{/packages/dispatch}">Dispatch</a>
</p>

<p th:if="${message}" th:text="${message}" style="color: green;"></p>
<p th:if="${error}" th:text="${error}" style="color: red;"></p>

<form th:action="@{/packages}" method="get" style="margin-bottom: 1em;">
    <label for="status">Filter by status</label>
    <select id="status" name="status" onchange="this.form.submit()">
        <option value="" th:selected="${statusFilter == null}">All</option>
        <option th:each="s : ${allStatuses}" th:value="${s.name()}" th:text="${s.name()}"
                th:selected="${statusFilter != null and statusFilter.name() == s.name()}">Status</option>
    </select>
    <input type="hidden" name="page" value="0"/>
    <input type="hidden" name="size" th:value="${packages.size}"/>
</form>

<table border="1" cellspacing="0" cellpadding="6">
    <thead>
    <tr>
        <th>Carrier</th>
        <th>Tracking number</th>
        <th>Owner</th>
        <th>Received at</th>
        <th>Status</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="p : ${packages.content}">
        <td th:text="${p.carrier}">Carrier</td>
        <td th:text="${p.originalTrackingNumber}">Tracking</td>
        <td th:text="${p.owner != null ? p.owner.code : '–'}">–</td>
        <td th:text="${#temporals.format(p.receivedAt, 'yyyy-MM-dd HH:mm')}">Received at</td>
        <td th:text="${p.status}">Status</td>
        <td>
            <span th:if="${p.status.name() == 'RECEIVED_US_UNASSIGNED'}">
                <button type="button" class="btn-assign" th:attr="data-package-id=${p.id}, data-tracking=${p.originalTrackingNumber}">Assign</button>
            </span>
            <span th:if="${p.status.name() != 'RECEIVED_US_UNASSIGNED'}">–</span>
        </td>
    </tr>
    <tr th:if="${packages.totalElements == 0}">
        <td colspan="6">No packages.</td>
    </tr>
    </tbody>
</table>

<div>
    <span th:text="'Showing ' + ${packages.numberOfElements} + ' of ' + ${packages.totalElements}"></span>
    <a th:if="${packages.hasPrevious()}" th:href="@{/packages(status=${statusFilter != null ? statusFilter.name() : null}, page=${packages.number - 1}, size=${packages.size})}">Prev</a>
    <span th:text="'Page ' + (${packages.number} + 1) + ' / ' + ${packages.totalPages}"></span>
    <a th:if="${packages.hasNext()}" th:href="@{/packages(status=${statusFilter != null ? statusFilter.name() : null}, page=${packages.number + 1}, size=${packages.size})}">Next</a>
</div>

<!-- Assign modal -->
<div id="assign-modal" class="modal" style="display: none;" aria-hidden="true">
    <div class="modal-overlay"></div>
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="assign-modal-title">Assign package to account</h2>
            <button type="button" class="modal-close" id="assign-modal-close" aria-label="Close">&times;</button>
        </div>
        <div class="modal-body">
            <p id="assign-package-info" class="assign-package-info"></p>
            <label for="account-search">Search account (code or name)</label>
            <input type="text" id="account-search" placeholder="Type to search..." autocomplete="off"/>
            <button type="button" id="account-search-btn">Search</button>
            <div id="account-search-loading" style="display: none;">Loading…</div>
            <div id="account-search-error" style="display: none;" class="error"></div>
            <table id="account-results-table" border="1" cellspacing="0" cellpadding="6" style="width: 100%; margin-top: 0.5em; display: none;">
                <thead>
                <tr><th>Code</th><th>Name</th><th>Action</th></tr>
                </thead>
                <tbody id="account-results-body"></tbody>
            </table>
            <p id="account-results-empty" style="display: none;">No accounts found. Try a different search.</p>
        </div>
    </div>
</div>

<form id="assign-form" method="post" action="" style="display: none;">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <input type="hidden" name="accountCode" id="assign-account-code"/>
    <input type="hidden" name="status" id="assign-status-filter" th:value="${statusFilter != null ? statusFilter.name() : ''}"/>
</form>

<style>
    .modal { position: fixed; inset: 0; z-index: 1000; }
    .modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); }
    .modal-content { position: relative; margin: 2rem auto; max-width: 560px; background: #fff; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); padding: 1rem 1.5rem; max-height: 90vh; overflow: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .modal-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; line-height: 1; color: #666; }
    .modal-close:hover { color: #000; }
    .assign-package-info { font-weight: bold; margin-bottom: 0.5em; }
    .error { color: #c00; }
</style>

<script th:inline="javascript">
(function() {
    const modal = document.getElementById('assign-modal');
    const overlay = modal && modal.querySelector('.modal-overlay');
    const closeBtn = document.getElementById('assign-modal-close');
    const packageInfoEl = document.getElementById('assign-package-info');
    const searchInput = document.getElementById('account-search');
    const searchBtn = document.getElementById('account-search-btn');
    const loadingEl = document.getElementById('account-search-loading');
    const errorEl = document.getElementById('account-search-error');
    const tableEl = document.getElementById('account-results-table');
    const tbodyEl = document.getElementById('account-results-body');
    const emptyEl = document.getElementById('account-results-empty');
    const assignForm = document.getElementById('assign-form');
    const assignAccountCode = document.getElementById('assign-account-code');
    const assignStatusFilter = document.getElementById('assign-status-filter');

    let currentPackageId = null;
    const statusFilterValue = /*[[${statusFilter != null ? statusFilter.name() : ''}]]*/ '';

    function showModal() { modal.style.display = 'block'; modal.setAttribute('aria-hidden', 'false'); }
    function hideModal() { modal.style.display = 'none'; modal.setAttribute('aria-hidden', 'true'); }

    function openAssign(packageId, tracking) {
        currentPackageId = packageId;
        packageInfoEl.textContent = 'Package: ' + (tracking || packageId);
        searchInput.value = '';
        tbodyEl.innerHTML = '';
        tableEl.style.display = 'none';
        emptyEl.style.display = 'none';
        errorEl.style.display = 'none';
        assignForm.action = '/packages/' + packageId + '/assign';
        if (assignStatusFilter) assignStatusFilter.value = statusFilterValue;
        showModal();
        searchInput.focus();
    }

    function doSearch() {
        const q = searchInput.value.trim();
        loadingEl.style.display = 'block';
        errorEl.style.display = 'none';
        tableEl.style.display = 'none';
        emptyEl.style.display = 'none';
        tbodyEl.innerHTML = '';

        var url = '/packages/accounts/search?size=20';
        if (q) url += '&q=' + encodeURIComponent(q);

        fetch(url, { method: 'GET', headers: { 'Accept': 'application/json' } })
            .then(function(r) { return r.json(); })
            .then(function(items) {
                loadingEl.style.display = 'none';
                if (!items || items.length === 0) {
                    emptyEl.style.display = 'block';
                    return;
                }
                tableEl.style.display = 'table';
                items.forEach(function(a) {
                    var code = (a.code || '').trim();
                    var name = (a.displayName || '').trim();
                    var tr = document.createElement('tr');
                    var tdCode = document.createElement('td');
                    var tdName = document.createElement('td');
                    var tdAction = document.createElement('td');
                    var btn = document.createElement('button');
                    tdCode.textContent = code;
                    tdName.textContent = name;
                    btn.type = 'button';
                    btn.className = 'assign-to-account';
                    btn.setAttribute('data-code', code);
                    btn.textContent = 'Assign to this account';
                    btn.addEventListener('click', function() {
                        assignAccountCode.value = code;
                        assignForm.submit();
                    });
                    tdAction.appendChild(btn);
                    tr.appendChild(tdCode);
                    tr.appendChild(tdName);
                    tr.appendChild(tdAction);
                    tbodyEl.appendChild(tr);
                });
            })
            .catch(function() {
                loadingEl.style.display = 'none';
                errorEl.style.display = 'block';
                errorEl.textContent = 'Could not search accounts.';
            });
    }

    document.querySelectorAll('.btn-assign').forEach(function(btn) {
        btn.addEventListener('click', function() {
            var id = btn.getAttribute('data-package-id');
            var tracking = btn.getAttribute('data-tracking') || '';
            if (id) openAssign(id, tracking);
        });
    });

    searchBtn.addEventListener('click', doSearch);
    searchInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') { e.preventDefault(); doSearch(); } });
    if (closeBtn) closeBtn.addEventListener('click', hideModal);
    if (overlay) overlay.addEventListener('click', hideModal);
})();
</script>

</body>
</html>
