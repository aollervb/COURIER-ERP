<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>API keys – Settings</title>
</head>
<body>

<h1>API keys</h1>
<p th:text="'Tenant: ' + ${tenantId}">Tenant</p>

<p th:if="${message}" th:text="${message}" style="color: green;"></p>
<p th:if="${error}" th:text="${error}" style="color: red;"></p>

<div th:if="${newApiKey}" style="margin: 1em 0; padding: 1em; background: #f0f0f0; border: 1px solid #ccc;">
    <p><strong>New API key (copy and store securely; it won’t be shown again):</strong></p>
    <code th:text="${newApiKey}" style="word-break: break-all;">ce_xxx</code>
    <p>Use it with <code>X-API-Key</code> header or <code>Authorization: Bearer &lt;key&gt;</code> for /api/public/** and /api/integration/**.</p>
</div>

<form th:action="@{/settings/api-keys}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <div>
        <label for="name">Name (optional)</label>
        <input id="name" type="text" name="name" maxlength="120" placeholder="e.g. Portal"/>
    </div>
    <button type="submit">Create API key</button>
</form>

<p><a th:href="@{/}">Back to home</a></p>

</body>
</html>
