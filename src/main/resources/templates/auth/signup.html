<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title>Sign up</title>
</head>
<body>

<h1>Sign up</h1>

<form th:action="@{/templates/auth/signup}" th:object="${form}" method="post">
    <input type="hidden"
           th:name="${_csrf.parameterName}"
           th:value="${_csrf.token}" />

    <div>
        <label>Email</label>
        <input type="email" th:field="*{email}" required />
        <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
    </div>

    <div>
        <label>First name</label>
        <input type="text" th:field="*{firstName}" required />
        <div th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
    </div>

    <div>
        <label>Last name</label>
        <input type="text" th:field="*{lastName}" required />
        <div th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
    </div>

    <div>
        <label>Password</label>
        <input type="password" th:field="*{password}" required />
        <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
    </div>

    <div>
        <label>Confirm password</label>
        <input type="password" th:field="*{confirmPassword}" required />
    </div>

    <button type="submit">Create account</button>
</form>

<p>
    Already have an account?
    <a th:href="@{/templates/auth/login}">Log in</a>
</p>

</body>
</html>
