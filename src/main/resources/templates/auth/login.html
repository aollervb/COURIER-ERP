<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title>Login</title>
</head>
<body>

<h1>Login</h1>

<div th:if="${param.registered}">
    <p>Account created. Please log in.</p>
</div>

<div th:if="${param.error}">
    <p style="color:red;">Invalid username or password</p>
</div>

<div th:if="${param.logout}">
    <p>You have been logged out.</p>
</div>

<!-- Form must POST to /auth/login-process. Tenant is read from the "tenant" field and sets the scope for login. -->
<form th:action="@{/auth/login-process}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
    <div>
        <label for="tenant">Tenant ID</label>
        <input id="tenant" name="tenant" type="text" required placeholder="e.g. jetpack or system" />
        <p class="hint">Your tenant identifier (e.g. <code>jetpack</code>). Use <code>system</code> for platform admin.</p>
    </div>
    <div>
        <label for="username">Email</label>
        <input id="username" name="username" type="email" required />
    </div>
    <div>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required />
    </div>
    <button type="submit">Login</button>
</form>

<p>Contact your administrator for access.</p>

</body>
</html>
